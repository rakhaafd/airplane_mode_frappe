<!DOCTYPE html>
<html>

<head>
    <title>Show Me Colors</title>
</head>

<body style="
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	margin: 0;
">

    {% set color = frappe.form_dict.color or "black" %}

    <div style="
		width: 300px;
		height: 200px;
		background-color: {{ color }};
		border-radius: 12px;
		border: 1px solid #ddd;
	">
    </div>

</body>

</html>
